  <!--quiz modal-->
  <div id="modal" class="modal modal-hidden"> <!--hidden state initially-->
    <div class="modal-content">
      <button class="close-btn" id="close-btn">&times;</button>
      <div class="province-featured">
        <img id="province-bg-img" class="province-bg-img" loading="lazy" alt="" />
      </div>
      <h2 id="province-name"></h2>
      <p class="province-info-label">背景介紹</p>
      <p id="province-info-text"></p>
      <p class="quiz-label">測驗題目</p>
      <p id="question-text"></p>
      <div id="options-container"></div>
      <p id="feedback" class="feedback hidden"></p> <!--hidden state initially-->
    </div>
  </div>

  <!-- Dashboard  -->
  <aside id="dashboard" class="dashboard-panel hidden">
    <div class="dashboard-header">
      <h3>回答統計</h3>
      <button id="dashboard-close-btn" class="dashboard-close-btn" type="button">×</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">已回答題數</div>
        <div class="stat-value" id="stat-total-answered">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">正確率</div>
        <div class="stat-value" id="stat-correct-rate">0%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">平均作答時間</div>
        <div class="stat-value" id="stat-avg-time">0.0 秒</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">已探索省份</div>
        <div class="stat-value" id="stat-explored-count">0</div>
      </div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">整體正確/錯誤比例</div>
        <div id="pie-chart" class="pie-chart"></div>
        <div class="pie-legend">
          <span class="legend-item"><i class="legend-dot correct-dot"></i>正確</span>
          <span class="legend-item"><i class="legend-dot wrong-dot"></i>錯誤</span>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">錯誤率最高（前 3 名）</div>
        <div id="bar-chart" class="bar-chart"></div>
      </div>
    </div>

    <div class="ranking-section">
      <div class="chart-title">各省正確率排名（由高到低）</div>
      <div id="ranking-list" class="ranking-list"></div>
    </div>

    <div class="ranking-section">
      <div class="chart-title">快速洞察</div>
      <div id="insights" class="insights"></div>
    </div>

    <div class="dashboard-footer">
      <button id="dashboard-reset-btn" class="reset-btn" type="button">重置所有統計</button>
    </div>
  </aside>

  <!-- Collection Panel -->
  <aside id="collection" class="collection-panel hidden">
    <div class="collection-header">
      <h3>我的卡片集</h3>
      <button id="collection-close-btn" class="collection-close-btn" type="button">×</button>
    </div>
    <div class="collection-grid" id="collection-grid">
      <!-- Dynamically filled with collected provinces -->
    </div>
  </aside>

  <!-- Exploration progress -->
  <div id="progress-wrap" class="progress-wrap">
    <div class="progress-bar">
      <div id="progress-fill" class="progress-fill" style="width:0%"></div>
    </div>
    <div id="progress-text" class="progress-text">已探索 0 / 31</div>
  </div>

  <!-- Quiz data -->
  <script src="js/questions.js"></script>
  <script src="js/app.js"></script>
</body>
